[paths]
input_dir = pdfs/input
output_dir = pdfs/output
processed_dir = pdfs/processed
error_dir = pdfs/error
training_dir = pdfs/training
log_dir = log

[worker]
# Number of concurrent PDF processing threads
thread_pool_size = 4

[extractor]
# Comma-separated glob patterns for image-based (OCR) PDFs
# e.g. scanned_*.pdf, invoice_*.pdf
ocr_filename_patterns = scanned_*.pdf, scan_*.pdf
# DPI for pdf2image conversion
ocr_dpi = 300
# Tesseract language(s)
ocr_lang = eng

[transformer]
# Claude model to use
model = claude-sonnet-4-6
# Max tokens for Claude response
max_tokens = 4096

[logging]
# DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = DEBUG
# Log filename (inside log_dir); date will be appended automatically
log_file_prefix = app
